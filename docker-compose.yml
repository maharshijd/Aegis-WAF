services:

  backend:
    image: nginx:alpine
    volumes:
      - ./backend:/usr/share/nginx/html

  python_waf:
    build: ./waf
    container_name: python_waf
    depends_on:
      - backend

  proxy:
    image: nginx
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8000:80"
    depends_on:
      - python_waf
